# ai-toolkit LoRA training config — FLUX.1-dev, RunPod A100 (40/80GB)
# Dataset: 270 images of Physarum/Boid sim crops, 1024x1024
#
# RunPod setup:
#   1. Spin up A100 pod (40GB+ VRAM), PyTorch 2.x template
#   2. git clone https://github.com/ostris/ai-toolkit && cd ai-toolkit
#   3. pip install -r requirements.txt
#   4. Upload dataset: rsync/scp datasets/sim_aesthetic/ to pod
#   5. python run.py train_config_flux.yaml
#
# Expected: ~15-20 min on A100 40GB, ~10 min on A100 80GB
# Cost: ~$1-2 total

job: extension
config:
  name: "sim_aesthetic_flux"
  process:
    - type: "sd_trainer"
      training_folder: "/workspace/output/sim_aesthetic_flux"
      device: "cuda:0"
      trigger_word: "simaesthetic"
      network:
        type: "lora"
        linear: 16
        linear_alpha: 16
      save:
        dtype: float16
        save_every: 250
        max_step_saves_to_keep: 5
      datasets:
        - folder_path: "/workspace/datasets/sim_aesthetic"
          caption_ext: "txt"
          caption_dropout_rate: 0.05
          resolution: 1024
          is_reg: false
      train:
        batch_size: 1
        steps: 2500            # ~9 epochs over 270 images
        gradient_accumulation_steps: 1
        train_unet: true
        train_text_encoder: false
        gradient_checkpointing: true
        noise_scheduler: "flowmatch"    # FLUX uses flow matching, not DDPM
        optimizer: "adamw8bit"
        lr: 1e-4
        lr_scheduler: "cosine"
        max_denoising_steps: 1000
      model:
        name_or_path: "black-forest-labs/FLUX.1-dev"
        is_flux: true
        quantize: true          # fp8 — fits A100 40GB comfortably
      sample:
        sampler: "flowmatch"
        sample_every: 250
        width: 1024
        height: 1024
        prompts:
          - "simaesthetic, bioluminescent organic network, physarum slime mold veins, cyan and amber glow, dark background"
          - "simaesthetic, dense cellular growth structure, branching transport network, scanning electron microscope aesthetic"
          - "a photograph of a golden retriever sitting in a park"
        seed: 42
        walk_seed: true
        guidance_scale: 3.5     # FLUX uses lower guidance than SDXL
        sample_steps: 28
